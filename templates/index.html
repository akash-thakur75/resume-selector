<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Screening System</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            max-width:800px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        textarea{
            width:100%;
            height:180px;
            padding:10px;
            font-size:16px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            font-size:16px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

        .result{
            margin-top:20px;
            padding:15px;
            background:#e8f5e9;
            border-radius:8px;
        }

        .error{
            margin-top:20px;
            padding:15px;
            background:#ffebee;
            color:red;
            border-radius:8px;
        }

        ul{
            padding-left:20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>AI Resume Screening System</h1>

    <form action="/analyze" method="POST">

        <label><b>Enter Job Description:</b></label>
        <br><br>

        <textarea name="job_description" required>{{ job_description }}</textarea>

        <br>

        <button type="submit">Analyze Resumes</button>

    </form>

    {% if error %}
    <div class="error">
        <b>Error:</b> {{ error }}
    </div>
    {% endif %}

    {% if best_resume %}
    <div class="result">

        <h2>Best Matching Resume</h2>

        <p>
            <b>Resume:</b>
            {{ best_resume }}
        </p>

        <p>
            <b>Score:</b>
            {{ best_score }}
        </p>

        <h3>All Resume Scores</h3>

        <ul>
            {% for file, score in results %}
            <li>
                {{ file }} → {{ score }}
            </li>
            {% endfor %}
        </ul>

    </div>
    {% endif %}

</div>

</body>
</html>
