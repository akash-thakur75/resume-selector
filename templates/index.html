<!DOCTYPE html>
<html>
<head>
    <title>Resume Selector AI</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 60%;
        }

        textarea {
            width: 100%;
            height: 150px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>AI Resume Screening System</h2>

    <form action="/analyze" method="POST">

        <label>Job Description:</label><br>
        <textarea name="job_description" required></textarea><br>

        <button type="submit">Analyze Resumes</button>

    </form>

    {% if best_resume %}

    <div class="result">
        <h3>Results</h3>

        <p><b>Best Resume:</b> {{ best_resume }}</p>
        <p><b>Score:</b> {{ best_score }}</p>

        <h4>All Scores:</h4>
        <ul>
            {% for file, score in results %}
                <li>{{ file }} → {{ score }}</li>
            {% endfor %}
        </ul>
    </div>

    {% endif %}

</div>

</body>
</html>
